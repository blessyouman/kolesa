{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="form-card">
    <h2>Регистрация</h2>

    {% if messages %}
        <ul class="messages">
            {% for message in messages %}
                <li>{{ message }}</li>
            {% endfor %}
        </ul>
    {% endif %}

    <form method="POST" action="{% url 'register' %}">
        {% csrf_token %}
        
        <div class="form-group">
            <label>ФИО:</label>
            <input type="text" name="full_name" placeholder="Иван Иванов" required>
        </div>

        <div class="form-group">
            <label>Логин (Username):</label>
            <input type="text" name="username" placeholder="ivan_99" required>
        </div>

        <div class="form-group">
            <label>Пароль:</label>
            <input type="password" name="password" placeholder="••••••••" required>
        </div>

        <div class="form-group">
            <label>Контактный телефон:</label>
            <input type="text" name="phone_number" placeholder="+7 707 111 2233" required>
        </div>

        <button type="submit" class="btn">Зарегистрироваться</button>
    </form>
</div>
{% endblock %}
